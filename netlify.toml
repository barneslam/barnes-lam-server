[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Route /api/* → /.netlify/functions/*
[[redirects]]
  from = "/api/build-persona"
  to = "/.netlify/functions/build-persona"
  status = 200

[[redirects]]
  from = "/api/emails/add"
  to = "/.netlify/functions/emails-add"
  status = 200

[[redirects]]
  from = "/api/:fn"
  to = "/.netlify/functions/:fn"
  status = 200

# Serve index.html for the root
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
